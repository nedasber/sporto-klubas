{% extends "base.html" %}
{% block title %}Sukurti treniruotę{% endblock %}

{% block content %}
<div class="page-header">
  <h2><i class="bi bi-plus-circle me-2" style="color:var(--primary);"></i>Sukurti treniruotę</h2>
  <p>Užpildykite informaciją apie naują treniruotę</p>
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="s-card">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        {% if form.errors %}
          <div class="alert alert-danger py-2 small mt-3">
            <i class="bi bi-exclamation-circle me-1"></i>
            {{ form.errors }}
          </div>
        {% endif %}

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i> Išsaugoti
          </button>
          <a class="btn btn-outline-secondary" href="/trainer/trainings/">Atgal</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll("form input:not([type=hidden]), form textarea, form select").forEach(i => {
    if(!i.classList.contains('form-control') && !i.classList.contains('form-select')){
      i.classList.add("form-control");
    }
  });
</script>
{% endblock %}
